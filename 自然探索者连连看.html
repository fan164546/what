<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nature Explorer Match | 探险家成就连连看</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #1a472a 0%, #2d6a4f 100%);
            font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* 主游戏面板 */
        .game-container {
            background: #fef7e0;
            border-radius: 3rem;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.4), inset 0 1px 4px rgba(255, 255, 200, 0.8);
            padding: 1.2rem 1.8rem 2rem;
            width: 1300px;
            max-width: 98vw;
            transition: all 0.2s;
        }

        /* 头部：计时器 + 重置按钮 + 进度 */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2e3b2c;
            padding: 0.6rem 2rem;
            border-radius: 60px;
            margin-bottom: 1.8rem;
            color: #f9eec1;
            box-shadow: inset 0 1px 3px #00000033, 0 4px 8px rgba(0,0,0,0.2);
            flex-wrap: wrap;
            gap: 10px;
        }
        .timer-box {
            font-size: 2.2rem;
            font-weight: bold;
            font-family: monospace;
            background: #00000066;
            padding: 0.2rem 1rem;
            border-radius: 48px;
            backdrop-filter: blur(2px);
        }
        .progress-badge {
            font-size: 1.2rem;
            font-weight: 600;
            background: #00000055;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
        }
        .reset-btn {
            background: #ffb347;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 2px 5px black;
            transition: 0.1s linear;
        }
        .reset-btn:active {
            transform: scale(0.96);
        }

        /* 左右两栏布局 */
        .match-area {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
        }
        .column {
            flex: 1;
            min-width: 280px;
            background: #faf0cf;
            border-radius: 2rem;
            padding: 1.2rem;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
        }
        .column h2 {
            text-align: center;
            font-size: 1.8rem;
            margin: 0 0 1rem 0;
            background: #8b5a2b;
            display: inline-block;
            width: 100%;
            padding: 0.4rem;
            border-radius: 40px;
            color: white;
            letter-spacing: 1px;
        }
        .card-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .explorer-card, .achieve-card {
            background: #ffffffdd;
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 0.9rem 1.2rem;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 0 #c7b27e;
            border: 2px solid #e7cf9e;
            font-family: inherit;
        }
        .selected {
            background: #ffe3a3;
            border: 3px solid #ff8800;
            transform: scale(1.01);
            box-shadow: 0 0 0 2px #ffcc55;
        }
        /* 配对成功卡片隐藏 (已配对不可选) */
        .explorer-card.matched, .achieve-card.matched {
            display: none;
        }

        /* 底部信息栏 (备用，但主要用弹窗展示解析) */
        .info-panel {
            margin-top: 1.5rem;
            background: #e9e1c7;
            border-radius: 2rem;
            padding: 0.6rem 1rem;
            font-size: 0.9rem;
            text-align: center;
            border-left: 8px solid #c98f3e;
            box-shadow: inset 0 0 0 1px #fff9e8, 0 6px 12px rgba(0,0,0,0.1);
            min-height: 60px;
            color: #3a2c1c;
        }

        /* ---------- 大号弹窗 Modal (解析专用) ---------- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s, opacity 0.3s ease;
        }
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-card {
            background: #fff9ef;
            border-radius: 48px;
            max-width: 550px;
            width: 85%;
            padding: 2rem 2rem 1.8rem;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
            border: 2px solid #e9c891;
            animation: modalPop 0.2s ease-out;
        }
        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-card h3 {
            font-size: 2rem;
            margin: 0 0 0.5rem;
            color: #2c5e2e;
            border-bottom: 3px solid #f3b33d;
            display: inline-block;
            padding-bottom: 5px;
        }
        .modal-bio {
            margin: 1.2rem 0;
            text-align: left;
            background: #fcf5e6;
            padding: 1.2rem;
            border-radius: 32px;
        }
        .modal-bio .eng {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1f543b;
            line-height: 1.4;
            margin-bottom: 0.8rem;
        }
        .modal-bio .cn {
            font-size: 1.3rem;
            font-weight: 500;
            color: #b45f2b;
            line-height: 1.4;
            border-top: 1px dashed #deb887;
            padding-top: 0.7rem;
        }
        .ok-btn {
            background: #ff9f3d;
            border: none;
            font-size: 1.7rem;
            font-weight: bold;
            padding: 0.6rem 2rem;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 0.8rem;
            font-family: inherit;
            box-shadow: 0 5px 0 #a5530e;
            transition: 0.05s linear;
            color: white;
        }
        .ok-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #a5530e;
        }

        /* 爆炸/彩带canvas */
        .effect-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        @media (max-width: 800px) {
            .modal-bio .eng { font-size: 1.1rem; }
            .modal-bio .cn { font-size: 1rem; }
            .modal-card { padding: 1.5rem; }
            .ok-btn { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-header">
        <div class="progress-badge" id="progressBadge">🏆 0 / 6 Matched</div>
        <div class="timer-box">⏱️ <span id="timerDisplay">0.00</span> s</div>
        <button class="reset-btn" id="resetGameBtn">🔄 New Game</button>
    </div>

    <div class="match-area">
        <!-- 左侧: NATURE EXPLORERS 固定顺序 -->
        <div class="column">
            <h2>🌿 NATURE EXPLORERS</h2>
            <div class="card-grid" id="explorersList"></div>
        </div>

        <!-- 右侧: ACHIEVEMENTS (顺序打乱) -->
        <div class="column">
            <h2>🏆 ACHIEVEMENTS</h2>
            <div class="card-grid" id="achievementsList"></div>
        </div>
    </div>

    <!-- 底部简单提示区 (保留，但不影响主流程) -->
    <div class="info-panel" id="infoPanel">
        ✨ Click a pioneer (left) + an achievement (right) to match! ✨
    </div>
</div>

<div class="effect-canvas" id="effectCanvas"></div>

<!-- 大号解析弹窗 Modal -->
<div id="bioModal" class="modal-overlay">
    <div class="modal-card">
        <h3>🏅 ACHIEVEMENT UNLOCKED! 🏅</h3>
        <div class="modal-bio" id="modalBioContent">
            <!-- 动态填充双语介绍 -->
        </div>
        <button class="ok-btn" id="modalOkBtn">OK ✓</button>
    </div>
</div>

<script>
    // ----- 配对数据 (人物与成就一一对应) -----
    const explorersData = [
        {
            id: "zhangheng",
            displayName: "Zhang Heng",
            achievementMatch: "an earthquake detector",
            bioEN: "🌍 Zhang Heng (78–139 AD) invented the world's first seismoscope to detect distant earthquakes. A brilliant astronomer and inventor!",
            bioCN: "🌏 张衡（公元78年—139年）发明了世界上第一台地动仪，能探测远方地震。杰出的天文学家、发明家！"
        },
        {
            id: "copernicus",
            displayName: "Nicolaus Copernicus",
            achievementMatch: "the sun is the center",
            bioEN: "☀️ Copernicus (1473–1543) proposed the heliocentric model: the Sun, not Earth, is the center of our universe.",
            bioCN: "🌟 哥白尼（1473年—1543年）提出了日心说模型：太阳是宇宙中心，而非地球。"
        },
        {
            id: "wangzhenyi",
            displayName: "Wang Zhenyi",
            achievementMatch: "the Earth is round, not flat",
            bioEN: "🌎 Wang Zhenyi (1768–1797) proved the Earth is spherical through lunar eclipse experiments. A brilliant Qing dynasty scientist!",
            bioCN: "🌙 王贞仪（1768年—1797年）通过月食实验证明了地球是球体。清代杰出女科学家！"
        },
        {
            id: "darwin",
            displayName: "Charles Darwin",
            achievementMatch: "theory of evolution",
            bioEN: "🐚 Charles Darwin (1809–1882) developed the theory of evolution by natural selection, changing biology forever.",
            bioCN: "🌿 查尔斯·达尔文（1809年—1882年）提出自然选择进化论，永远改变了生物学。"
        },
        {
            id: "lishizhen",
            displayName: "Li Shizhen",
            achievementMatch: "Bencao Gangmu",
            bioEN: "📜 Li Shizhen (1518–1593) wrote 'Compendium of Materia Medica' (Bencao Gangmu), a massive herbal encyclopedia.",
            bioCN: "📖 李时珍（1518年—1593年）编著《本草纲目》，一部伟大的药物学百科全书。"
        },
        {
            id: "xuxiake",
            displayName: "Xu Xiake",
            achievementMatch: "Xu Xiake’s Travel Notes",
            bioEN: "🏔️ Xu Xiake (1587–1641) was a famous geographer; his travel diaries recorded detailed geography and customs.",
            bioCN: "✍️ 徐霞客（1587年—1641年）著名地理学家，《徐霞客游记》记录了详细的地理风貌。"
        }
    ];

    // 成就原始数据 (未打乱)
    const rawAchievements = [
        { achievementKey: "an earthquake detector", display: "🌍 Earthquake Detector" },
        { achievementKey: "the sun is the center", display: "☀️ The Sun is the Center" },
        { achievementKey: "the Earth is round, not flat", display: "🌎 Earth is Round, not Flat" },
        { achievementKey: "theory of evolution", display: "🐚 Theory of Evolution" },
        { achievementKey: "Bencao Gangmu", display: "📜 Bencao Gangmu (本草纲目)" },
        { achievementKey: "Xu Xiake’s Travel Notes", display: "📖 Xu Xiake’s Travel Notes" }
    ];

    // 辅助映射
    const explorerToAchievementKey = {};
    explorersData.forEach(exp => { explorerToAchievementKey[exp.id] = exp.achievementMatch; });
    const achievementKeyToExplorerId = {};
    explorersData.forEach(exp => { achievementKeyToExplorerId[exp.achievementMatch] = exp.id; });
    const bioMap = {};
    explorersData.forEach(exp => { bioMap[exp.id] = { en: exp.bioEN, cn: exp.bioCN, name: exp.displayName }; });

    // 游戏状态
    let explorersList = [];      // { id, name, matched, dom }
    let achievementsList = [];    // { achievementKey, display, matched, dom }
    let selectedSide = null;      // 'explorer' or 'achievement'
    let selectedItem = null;       // 存储选中的对象引用
    let timerRunning = true;
    let startTime = null;
    let timerInterval = null;
    let matchedCount = 0;
    const totalPairs = explorersData.length;

    // 阻塞标记: 当弹窗显示时禁止任何配对/点击操作
    let isModalOpen = false;

    // DOM 元素
    const explorersContainer = document.getElementById('explorersList');
    const achievementsContainer = document.getElementById('achievementsList');
    const timerDisplaySpan = document.getElementById('timerDisplay');
    const resetBtn = document.getElementById('resetGameBtn');
    const progressBadge = document.getElementById('progressBadge');
    const modalOverlay = document.getElementById('bioModal');
    const modalBioContent = document.getElementById('modalBioContent');
    const modalOkBtn = document.getElementById('modalOkBtn');

    // ---------- 特效: 彩带 & 爆炸 ----------
    function showConfetti() {
        const canvas = document.createElement('canvas');
        canvas.style.position = 'fixed';
        canvas.style.top = '0';
        canvas.style.left = '0';
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        canvas.style.pointerEvents = 'none';
        canvas.style.zIndex = '1000';
        document.body.appendChild(canvas);
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        for (let i = 0; i < 130; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                size: Math.random() * 8 + 4,
                color: `hsl(${Math.random() * 360}, 80%, 60%)`,
                speedY: Math.random() * 6 + 4,
                speedX: (Math.random() - 0.5) * 2,
                rotation: Math.random() * 360
            });
        }
        let animFrame;
        let startEffect = performance.now();
        function drawConfetti(now) {
            if (!canvas.parentNode) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let anyAlive = false;
            for (let p of particles) {
                p.y += p.speedY;
                p.x += p.speedX;
                if (p.y < canvas.height + 60) anyAlive = true;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation * Math.PI/180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size/1.5);
                ctx.restore();
            }
            if (anyAlive && performance.now() - startEffect < 1900) {
                animFrame = requestAnimationFrame(drawConfetti);
            } else {
                canvas.remove();
                cancelAnimationFrame(animFrame);
            }
        }
        animFrame = requestAnimationFrame(drawConfetti);
        setTimeout(() => {
            if (canvas.parentNode) canvas.remove();
            if (animFrame) cancelAnimationFrame(animFrame);
        }, 1800);
    }

    function showExplosion() {
        const canvas = document.createElement('canvas');
        canvas.style.position = 'fixed';
        canvas.style.top = '0';
        canvas.style.left = '0';
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        canvas.style.pointerEvents = 'none';
        canvas.style.zIndex = '1000';
        document.body.appendChild(canvas);
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        let particles = [];
        for (let i = 0; i < 70; i++) {
            let angle = Math.random() * Math.PI * 2;
            let speed = Math.random() * 12 + 3;
            let vx = Math.cos(angle) * speed;
            let vy = Math.sin(angle) * speed;
            particles.push({
                x: centerX, y: centerY, vx: vx, vy: vy,
                life: 1, size: Math.random() * 7 + 3,
                color: `hsl(${Math.random() * 40 + 20}, 90%, 58%)`
            });
        }
        function animateExplode() {
            if (!canvas.parentNode) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let anyAlive = false;
            for (let p of particles) {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.035;
                if (p.life > 0) anyAlive = true;
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            }
            if (anyAlive) {
                requestAnimationFrame(animateExplode);
            } else {
                canvas.remove();
            }
        }
        requestAnimationFrame(animateExplode);
        // 震动效果
        const container = document.querySelector('.game-container');
        if (container) {
            container.style.transform = 'translateX(4px)';
            setTimeout(() => { if(container) container.style.transform = ''; }, 80);
        }
    }

    // 显示错误提示 (简单英文 + 爆炸特效)
    function showWrongMessage() {
        const infoDiv = document.getElementById('infoPanel');
        const originalMsg = infoDiv.innerHTML;
        infoDiv.innerHTML = "❌ Oops! That's not the correct match. Try again! ❌";
        showExplosion();
        setTimeout(() => {
            if (infoDiv.innerHTML.includes("Oops")) {
                infoDiv.innerHTML = "✨ Click a pioneer and an achievement to match! ✨";
            }
        }, 1200);
    }

    // 大号弹窗: 展示配对成功的双语介绍，并且阻塞游戏直到点击 OK
    function showAchievementBio(explorerId, onCloseCallback) {
        const bio = bioMap[explorerId];
        if (!bio) return;
        // 填充弹窗内容 (大字体双语)
        modalBioContent.innerHTML = `
            <div class="eng">📖 ${bio.en}</div>
            <div class="cn">📜 ${bio.cn}</div>
        `;
        // 显示弹窗，阻塞交互
        isModalOpen = true;
        modalOverlay.classList.add('active');
        // 暂存回调
        window.pendingResumeCallback = onCloseCallback;
    }

    // 关闭弹窗，恢复游戏逻辑 (允许继续配对)
    function closeModalAndResume() {
        if (!isModalOpen) return;
        modalOverlay.classList.remove('active');
        isModalOpen = false;
        if (window.pendingResumeCallback) {
            window.pendingResumeCallback();
            window.pendingResumeCallback = null;
        }
        // 弹窗关闭后检查是否胜利
        checkWinAfterModal();
    }

    function checkWinAfterModal() {
        if (matchedCount === totalPairs && timerRunning) {
            timerRunning = false;
            if (timerInterval) clearInterval(timerInterval);
            const infoDiv = document.getElementById('infoPanel');
            infoDiv.innerHTML = "🎉 PERFECT! You matched all pioneers & achievements! 🎉";
            showConfetti();
            showConfetti();
        }
    }

    // 配对成功处理 (带弹窗阻塞)
    function handleMatchSuccess(explorerItem, achievementItem) {
        // 标记为已配对
        explorerItem.matched = true;
        achievementItem.matched = true;
        matchedCount++;
        // 更新进度显示
        progressBadge.innerText = `🏆 ${matchedCount} / ${totalPairs} Matched`;
        // 隐藏卡片DOM
        explorerItem.dom.classList.add('matched');
        achievementItem.dom.classList.add('matched');
        // 彩带特效
        showConfetti();
        // 记录需要展示的探险家id
        const expId = explorerItem.id;
        // 清除当前任何高亮及选择状态 (避免残留)
        clearHighlights();
        selectedSide = null;
        selectedItem = null;
        // 弹出大号模态框（阻塞后续配对）
        showAchievementBio(expId, () => {
            // 模态框点击OK后执行的回调: 继续游戏
            // 不需要额外动作，但需要确保如果游戏已经胜利可以停止计时等
            // 但胜利检测会在关闭弹窗后调用
        });
    }

    // 清除卡片高亮
    function clearHighlights() {
        document.querySelectorAll('.explorer-card, .achieve-card').forEach(card => {
            card.classList.remove('selected');
        });
    }

    function resetSelection() {
        clearHighlights();
        selectedSide = null;
        selectedItem = null;
    }

    // 配对尝试 (核心)
    function attemptMatch(explorer, achievement) {
        if (isModalOpen) return false;   // 弹窗打开时不能操作
        if (explorer.matched || achievement.matched) return false;
        const expectedAchievement = explorerToAchievementKey[explorer.id];
        if (expectedAchievement === achievement.achievementKey) {
            // 正确匹配
            handleMatchSuccess(explorer, achievement);
            return true;
        } else {
            // 错误匹配: 爆炸 + 简单英文提示
            showWrongMessage();
            resetSelection();
            return false;
        }
    }

    // ----- 事件处理 (带弹窗阻塞) -----
    function onExplorerClick(idx) {
        if (isModalOpen) return;
        if (!timerRunning) return;
        const exp = explorersList[idx];
        if (exp.matched) return;
        // 情况1：未选中任何项
        if (selectedSide === null) {
            resetSelection();
            selectedSide = 'explorer';
            selectedItem = exp;
            exp.dom.classList.add('selected');
        }
        // 情况2：已选中一个成就 -> 尝试配对
        else if (selectedSide === 'achievement') {
            const ach = selectedItem;
            if (ach.matched) {
                resetSelection();
                return;
            }
            attemptMatch(exp, ach);
        }
        // 情况3：已选中另一个探险家 -> 切换选中
        else if (selectedSide === 'explorer') {
            // 清除旧高亮
            if (selectedItem) selectedItem.dom.classList.remove('selected');
            selectedItem = exp;
            exp.dom.classList.add('selected');
        }
    }

    function onAchievementClick(idx) {
        if (isModalOpen) return;
        if (!timerRunning) return;
        const ach = achievementsList[idx];
        if (ach.matched) return;
        if (selectedSide === null) {
            resetSelection();
            selectedSide = 'achievement';
            selectedItem = ach;
            ach.dom.classList.add('selected');
        }
        else if (selectedSide === 'explorer') {
            const exp = selectedItem;
            if (exp.matched) {
                resetSelection();
                return;
            }
            attemptMatch(exp, ach);
        }
        else if (selectedSide === 'achievement') {
            if (selectedItem) selectedItem.dom.classList.remove('selected');
            selectedItem = ach;
            ach.dom.classList.add('selected');
        }
    }

    // 打乱数组 (Fisher-Yates)
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // 构建游戏 (右侧成就顺序打乱)
    function buildGame() {
        explorersContainer.innerHTML = '';
        achievementsContainer.innerHTML = '';
        explorersList = [];
        achievementsList = [];

        // 左侧探险家 (保持原始顺序)
        explorersData.forEach((exp, idx) => {
            const card = document.createElement('div');
            card.className = 'explorer-card';
            card.textContent = exp.displayName;
            explorersContainer.appendChild(card);
            const expObj = {
                id: exp.id,
                name: exp.displayName,
                matched: false,
                dom: card,
                matchKey: exp.achievementMatch
            };
            explorersList.push(expObj);
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                onExplorerClick(idx);
            });
        });

        // 右侧成就: 深拷贝并且打乱顺序
        let shuffledAchievements = [...rawAchievements];
        shuffledAchievements = shuffleArray(shuffledAchievements);
        shuffledAchievements.forEach((ach, idx) => {
            const card = document.createElement('div');
            card.className = 'achieve-card';
            card.textContent = ach.display;
            achievementsContainer.appendChild(card);
            const achObj = {
                achievementKey: ach.achievementKey,
                display: ach.display,
                matched: false,
                dom: card
            };
            achievementsList.push(achObj);
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                onAchievementClick(idx);
            });
        });

        matchedCount = 0;
        progressBadge.innerText = `🏆 0 / ${totalPairs} Matched`;
        resetSelection();
    }

    // 计时器
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        startTime = performance.now();
        timerRunning = true;
        timerInterval = setInterval(() => {
            if (!timerRunning) return;
            const now = performance.now();
            const elapsed = (now - startTime) / 1000;
            timerDisplaySpan.textContent = elapsed.toFixed(2);
        }, 100);
    }

    function resetGame() {
        if (isModalOpen) {
            // 强制关闭弹窗防止状态错乱
            modalOverlay.classList.remove('active');
            isModalOpen = false;
            if (window.pendingResumeCallback) window.pendingResumeCallback = null;
        }
        if (timerInterval) clearInterval(timerInterval);
        buildGame();
        startTimer();
        timerRunning = true;
        matchedCount = 0;
        selectedSide = null;
        selectedItem = null;
        clearHighlights();
        const infoDiv = document.getElementById('infoPanel');
        infoDiv.innerHTML = "✨ Click a pioneer (left) + an achievement (right) to match! ✨";
        progressBadge.innerText = `🏆 0 / ${totalPairs} Matched`;
    }

    // 绑定重置与弹窗OK按钮
    resetBtn.addEventListener('click', () => {
        resetGame();
    });
    modalOkBtn.addEventListener('click', () => {
        closeModalAndResume();
    });
    // 点击遮罩层背景不关闭，必须点OK，保证学生看完解析

    // 初始化
    buildGame();
    startTimer();
</script>
</body>
